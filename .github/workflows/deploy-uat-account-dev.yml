name: Deploy UAT Account Dev

# 手動觸發：部署至 dev 帳號 ws_dev 的 uat_dev 環境（供 UAT 驗證前的沙盒測試）
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to deploy'
        required: false
        default: 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat_dev
    permissions:
      id-token: write
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_WS_DEV_HOST }}
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_AUDIT_CLIENT_ID }}
      DATABRICKS_TOKEN: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          python-version: "3.13.0"
          enable-cache: true

      - name: Build wheel
        run: uv build --wheel

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.291.0

      - name: Log auth info
        run: databricks auth env

      - name: Validate bundle (uat_dev)
        run: databricks bundle validate -t uat_dev

      - name: Deploy to UAT Account Dev
        run: |
          WHL_FILE=$(ls dist/*.whl | head -1)
          WHL_VERSION=$(basename "$WHL_FILE" | cut -d'-' -f2)
          PIF_VERSION=$(databricks workspace list \
            "/Workspace/Shared/bundles/pipeline_ingestion_framework/uat_dev/artifacts/.internal" \
            --output json \
            | python3 -c "import json,sys,re; objs=json.load(sys.stdin).get('objects',[]); whls=[o['path'] for o in objs if 'pipeline_ingestion_framework-' in o.get('path','')]; sys.exit('ERROR: PIF whl not found') if not whls else None; m=re.search(r'pipeline_ingestion_framework-(.+?)-py3',whls[-1]); print(m.group(1)) if m else sys.exit('ERROR: cannot parse PIF version')")
          DVF_VERSION=$(databricks workspace list \
            "/Workspace/Shared/bundles/data_validation_framework/uat_dev/artifacts/.internal" \
            --output json \
            | python3 -c "import json,sys,re; objs=json.load(sys.stdin).get('objects',[]); whls=[o['path'] for o in objs if 'data_validation_framework-' in o.get('path','')]; sys.exit('ERROR: DVF whl not found') if not whls else None; m=re.search(r'data_validation_framework-(.+?)-py3',whls[-1]); print(m.group(1)) if m else sys.exit('ERROR: cannot parse DVF version')")
          databricks bundle deploy -t uat_dev \
            --var="whl_version=$WHL_VERSION" \
            --var="pif_whl_version=$PIF_VERSION" \
            --var="dvf_whl_version=$DVF_VERSION"
